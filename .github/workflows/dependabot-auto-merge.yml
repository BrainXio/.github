# .github/workflows/dependabot-auto-merge.yml
# Auto-merge low-risk Dependabot PRs (security, patch & minor updates)
# Recommended for central placement (e.g. brainxio/.github) to apply org-wide

name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write      # for merge (if needed) + auto-merge enable
  pull-requests: write # for approve + comment

jobs:
  dependabot-auto-merge:
    # Only run for Dependabot PRs
    if: ${{ github.actor == 'dependabot[bot]' }}

    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge & approve low-risk updates
        if: >
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-security-patch' ||
          (steps.metadata.outputs.update-type == 'version-update:semver-major' && steps.metadata.outputs.package-ecosystem == 'github-actions')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # Enable GitHub auto-merge (merges when checks pass & branch protection satisfied)
          gh pr merge --auto --squash "$PR_URL" \
            --body "Auto-merged low-risk Dependabot update (${{ steps.metadata.outputs.update-type }})"

      - name: Approve PR (extra safety layer)
        if: >
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-security-patch' ||
          (steps.metadata.outputs.update-type == 'version-update:semver-major' && steps.metadata.outputs.package-ecosystem == 'github-actions')
        uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add visibility comment
        if: >
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-security-patch' ||
          (steps.metadata.outputs.update-type == 'version-update:semver-major' && steps.metadata.outputs.package-ecosystem == 'github-actions')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Auto-merged**: Low-risk Dependabot update\n' +
                    `- Type: ${{ steps.metadata.outputs.update-type }}\n` +
                    `- Dependency: ${{ steps.metadata.outputs.dependency-names }}\n` +
                    'Will merge automatically once checks pass.'
            })
